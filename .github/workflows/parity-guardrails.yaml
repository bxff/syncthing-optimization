name: parity-guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - release
      - release-nightly
      - infrastructure
  workflow_dispatch:

jobs:
  parity-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Parity PR drift guard
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${GITHUB_BASE_REF}" --depth=1
          go run ./script/parity_pr_guard.go --base "origin/${GITHUB_BASE_REF}" --head "HEAD"

      - name: Generate parity artifacts
        run: go run ./script/parity.go generate

      - name: Run differential parity harness
        run: |
          go run ./script/parity_harness.go run \
            --config parity/harness/scenarios.json \
            --latest parity/diff-reports/latest.json \
            --test-status parity/diff-reports/test-status.json \
            --interop parity/diff-reports/interop.json \
            --durability parity/diff-reports/durability.json \
            --profile-mb 50 \
            --required-evidence-min synthetic || true

      - name: Verify committed parity artifacts are up to date
        run: git diff --exit-code -- parity/feature-manifest.json parity/mapping-rust.json parity/exceptions.json parity/diff-reports parity/harness

      - name: Enforce parity guardrails (CI mode)
        run: go run ./script/parity.go check --mode ci --report parity/guardrail-report.json

      - name: Build parity dashboard
        if: always()
        run: go run ./script/parity.go dashboard

      - name: Publish parity dashboard in step summary
        if: always()
        run: cat parity/dashboard.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-guardrails
          path: |
            parity/feature-manifest.json
            parity/mapping-rust.json
            parity/exceptions.json
            parity/diff-reports
            parity/guardrail-report.json
            parity/dashboard.json
            parity/dashboard.md

  parity-release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    needs: parity-ci
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate parity artifacts
        run: go run ./script/parity.go generate

      - name: Run differential parity harness
        run: |
          go run ./script/parity_harness.go run \
            --config parity/harness/scenarios.json \
            --latest parity/diff-reports/latest.json \
            --test-status parity/diff-reports/test-status.json \
            --interop parity/diff-reports/interop.json \
            --durability parity/diff-reports/durability.json \
            --profile-mb 50 \
            --required-evidence-min synthetic || true

      - name: Enforce parity guardrails (release mode)
        run: go run ./script/parity.go check --mode release --report parity/guardrail-report-release.json

      - name: Upload release guardrail report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-guardrails-release
          path: |
            parity/guardrail-report-release.json
            parity/diff-reports
